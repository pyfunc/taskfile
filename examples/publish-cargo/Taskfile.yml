version: "1"
name: my-rust-crate
description: Rust crate → crates.io publishing pipeline

variables:
  CRATE_NAME: my-rust-crate
  VERSION: "0.1.0"

tasks:

  fmt:
    desc: Check formatting (rustfmt)
    cmds:
      - cargo fmt --check
    ignore_errors: true

  clippy:
    desc: Run Clippy linter
    cmds:
      - cargo clippy -- -D warnings
    ignore_errors: true

  test:
    desc: Run tests
    cmds:
      - cargo test --verbose

  build:
    desc: Build release binary
    deps: [test]
    cmds:
      - cargo build --release

  build-cross:
    desc: Cross-compile for Linux, macOS, Windows
    cmds:
      - cargo build --release --target x86_64-unknown-linux-gnu
      - cargo build --release --target x86_64-apple-darwin
      - cargo build --release --target x86_64-pc-windows-gnu

  publish:
    desc: Publish to crates.io (with dry-run first)
    deps: [build]
    cmds:
      - cargo publish --dry-run
      - cargo publish

  release:
    desc: Tag + test + publish
    deps: [fmt, clippy, test]
    parallel: true
    cmds:
      - cargo publish --dry-run
      - git tag -a v${VERSION} -m "Release v${VERSION}"
      - git push origin v${VERSION}
      - cargo publish

  verify:
    desc: Search crates.io for published crate
    cmds:
      - cargo search ${CRATE_NAME}

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
