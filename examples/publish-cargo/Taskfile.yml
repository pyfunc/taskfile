version: "1"
name: my-rust-crate
description: >
  Rust crate → crates.io publishing pipeline.
  Clippy, test, build, publish.

variables:
  CRATE_NAME: my-rust-crate
  VERSION: "0.1.0"

environments:
  local:
    container_runtime: docker
    compose_command: docker compose

tasks:

  fmt:
    desc: Format code with rustfmt
    cmds:
      - cargo fmt --check
    ignore_errors: true

  clippy:
    desc: Run Clippy linter
    cmds:
      - cargo clippy -- -D warnings
    ignore_errors: true

  test:
    desc: Run tests
    cmds:
      - cargo test --verbose

  build:
    desc: Build release binary
    deps: [test]
    cmds:
      - cargo build --release
      - echo "📦 Built → target/release/${CRATE_NAME}"

  build-all-targets:
    desc: Build for Linux, macOS, Windows
    cmds:
      - cargo build --release --target x86_64-unknown-linux-gnu
      - cargo build --release --target x86_64-apple-darwin
      - cargo build --release --target x86_64-pc-windows-gnu
      - echo "✅ Built for 3 platforms"

  doc:
    desc: Generate docs
    cmds:
      - cargo doc --no-deps --open

  publish-dry:
    desc: Dry-run publish (verify metadata)
    deps: [test]
    cmds:
      - cargo publish --dry-run
      - echo "✅ Dry run OK — ready to publish"

  publish:
    desc: Publish to crates.io
    deps: [publish-dry]
    cmds:
      - cargo publish
      - echo "✅ Published ${CRATE_NAME} v${VERSION} to crates.io"
      - echo "   https://crates.io/crates/${CRATE_NAME}"

  verify:
    desc: Verify crate is available on crates.io
    cmds:
      - cargo search ${CRATE_NAME}
      - echo "✅ ${CRATE_NAME} is live on crates.io"

  release:
    desc: Full release — fmt, test, tag, publish
    deps: [fmt, clippy, test]
    parallel: true
    cmds:
      - cargo publish --dry-run
      - git tag -a v${VERSION} -m "Release v${VERSION}"
      - git push origin v${VERSION}
      - cargo publish
      - echo "🚀 Released ${CRATE_NAME} v${VERSION}"

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
      - echo "🧹 Cleaned"
