version: "1"
name: my-multiplatform-app
description: >
  Multi-platform deployment example.
  Desktop (Electron) + Web (Docker/CDN) × Local + Production.
  Standardized deploy format: taskfile --env <env> --platform <platform> run deploy

default_env: local
default_platform: web

variables:
  APP_NAME: my-app
  REGISTRY: ghcr.io/myorg
  TAG: latest
  
  # VPS Configuration - just add IP and SSH key path!
  VPS_IP: ${VPS_IP:-your-vps-ip}
  VPS_USER: ${VPS_USER:-deploy}
  VPS_SSH_KEY: ${VPS_SSH_KEY:-~/.ssh/id_ed25519}

# ─── Environments ─────────────────────────────────────
#
# Environment = WHERE we deploy (local machine vs remote server)
#

environments:
  local:
    container_runtime: docker
    compose_command: docker compose
    env_file: .env.local
    variables:
      DOMAIN: ${APP_NAME}.localhost

  prod:
    desc: Production VPS (auto-configured from VPS_IP env var)
    container_runtime: podman
    service_manager: systemd
    # Auto-configured from .env or environment variables:
    # Just set VPS_IP, VPS_USER, VPS_SSH_KEY in .env
    variables:
      DOMAIN: ${VPS_IP}
      SSH_HOST: ${VPS_IP}
      SSH_USER: ${VPS_USER:-deploy}
      SSH_KEY: ${VPS_SSH_KEY:-~/.ssh/id_ed25519}

# ─── Platforms ────────────────────────────────────────
#
# Platform = WHAT we deploy (desktop app vs web app)
# Each platform has its own build/deploy commands and variables.
#

platforms:
  desktop:
    desc: Electron desktop application
    variables:
      BUILD_DIR: dist/desktop
      ELECTRON_BUILDER_OPTS: "--linux --win --mac"
    build_cmd: npm run build:electron
    deploy_cmd: npm run publish:electron

  web:
    desc: Web application (Docker container)
    variables:
      BUILD_DIR: dist/web
      WEB_PORT: "3000"
    build_cmd: npm run build:web
    deploy_cmd: docker compose up -d

# ═══════════════════════════════════════════════════════
#  Deploy matrix:
#
#  ┌──────────┬───────────────────────┬──────────────────────────┐
#  │          │ local                 │ prod (VPS)               │
#  ├──────────┼───────────────────────┼──────────────────────────┤
#  │ desktop  │ npm run dev:electron  │ electron-builder publish │
#  │ web      │ docker compose up     │ podman pull + restart    │
#  └──────────┴───────────────────────┴──────────────────────────┘
#
#  Quick Start (VPS deploy):
#    1. echo "VPS_IP=your.vps.ip" > .env
#    2. ssh-copy-id -i ~/.ssh/id_ed25519.pub root@$VPS_IP
#    3. taskfile --env prod --platform web run deploy
#
#  Usage:
#    taskfile --env local --platform desktop run deploy   # Desktop local
#    taskfile --env local --platform web run deploy     # Web local
#    taskfile --env prod --platform desktop run deploy   # Desktop build
#    taskfile --env prod --platform web run deploy       # Web prod VPS
#    taskfile run release                                # All platforms
#
# ═══════════════════════════════════════════════════════

tasks:

  # ─── Common ─────────────────────────────────────
  install:
    desc: Install dependencies
    cmds:
      - npm ci

  lint:
    desc: Run linter
    cmds:
      - npm run lint
    ignore_errors: true

  test:
    desc: Run tests
    cmds:
      - npm run test

  # ─── Build ──────────────────────────────────────
  build:
    desc: Build for current platform
    deps: [install, test]
    cmds:
      - echo "🔨 Building ${APP_NAME} for platform=${PLATFORM} env=${ENV}"
      - npm run build:${PLATFORM}

  build-desktop:
    desc: Build Electron desktop app
    platform: [desktop]
    deps: [install]
    cmds:
      - npm run build:electron
      - echo "📦 Desktop build → ${BUILD_DIR}"

  build-web:
    desc: Build web app
    platform: [web]
    deps: [install]
    cmds:
      - npm run build:web
      - echo "📦 Web build → ${BUILD_DIR}"

  # ─── Deploy: Desktop × Local ───────────────────
  deploy-desktop-local:
    desc: Run desktop app locally (dev mode)
    env: [local]
    platform: [desktop]
    cmds:
      - npm run dev:electron
      - echo "✅ Desktop app running locally"

  # ─── Deploy: Desktop × Prod ────────────────────
  deploy-desktop-prod:
    desc: Publish desktop app to release channels
    env: [prod]
    platform: [desktop]
    deps: [build-desktop]
    cmds:
      - npm run publish:electron -- ${ELECTRON_BUILDER_OPTS}
      - echo "✅ Desktop ${APP_NAME}:${TAG} published"

  # ─── Deploy: Web × Local ───────────────────────
  deploy-web-local:
    desc: Start web app locally with Docker Compose
    env: [local]
    platform: [web]
    cmds:
      - docker compose --env-file .env.local up -d --build
      - echo ""
      - "echo '✅ Web app running:'"
      - "echo '   http://${DOMAIN}'"

  # ─── Deploy: Web × Prod ────────────────────────
  deploy-web-prod:
    desc: Deploy web app to production server
    env: [prod]
    platform: [web]
    deps: [build-web]
    cmds:
      - docker build -t ${REGISTRY}/${APP_NAME}:${TAG} .
      - docker push ${REGISTRY}/${APP_NAME}:${TAG}
      - "@remote podman pull ${REGISTRY}/${APP_NAME}:${TAG}"
      - "@remote systemctl --user restart ${APP_NAME}"
      - "@remote podman image prune -f"
      - echo "✅ Web ${APP_NAME}:${TAG} → https://${DOMAIN}"

  # ─── Universal deploy (auto-routes) ────────────
  deploy:
    desc: "Deploy to current env+platform (use --env and --platform)"
    cmds:
      - echo "🚀 Deploying ${APP_NAME} — env=${ENV} platform=${PLATFORM} tag=${TAG}"
      - taskfile --env ${ENV} --platform ${PLATFORM} run deploy-${PLATFORM}-${ENV}

  # ─── Operations ─────────────────────────────────
  status:
    desc: Check service status
    env: [prod]
    platform: [web]
    cmds:
      - "@remote podman ps --filter name=${APP_NAME}"

  logs:
    desc: View logs
    env: [local]
    platform: [web]
    cmds:
      - docker compose logs -f

  logs-remote:
    desc: View remote logs
    env: [prod]
    platform: [web]
    cmds:
      - "@remote journalctl --user -u ${APP_NAME} -f --no-pager -n 100"

  stop:
    desc: Stop local services
    env: [local]
    platform: [web]
    cmds:
      - docker compose down

  stop-remote:
    desc: Stop remote service
    env: [prod]
    platform: [web]
    cmds:
      - "@remote systemctl --user stop ${APP_NAME}"

  # ─── Cleanup ────────────────────────────────────
  cleanup:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/
      - echo "🧹 Cleaned build artifacts"

  cleanup-remote:
    desc: Clean unused images on server
    env: [prod]
    platform: [web]
    cmds:
      - "@remote podman image prune -af"
      - "@remote podman volume prune -f"
      - echo "🧹 Cleaned remote resources"

  # ─── Release ────────────────────────────────────
  release:
    desc: Full release — tag, build all platforms, deploy
    cmds:
      - echo "🚀 Releasing ${APP_NAME}:${TAG}"
      - git tag -a ${TAG} -m "Release ${TAG}"
      - git push origin ${TAG}
      - taskfile --env prod --platform web run deploy-web-prod
      - taskfile --env prod --platform desktop run deploy-desktop-prod
      - echo "📦 Released ${APP_NAME}:${TAG} on all platforms"

  # ─── CI/CD Generation ────────────────────────────────────
  ci-generate:
    desc: Generate CI/CD pipeline files (GitHub Actions, GitLab CI, etc.)
    cmds:
      - echo "🔧 Generating CI/CD configuration files..."
      - mkdir -p .github/workflows
      - |
        # Generate GitHub Actions workflow
        cat > .github/workflows/deploy.yml << 'EOF'
        name: Deploy
        on:
          push:
            branches: [main]
          workflow_dispatch:
        
        jobs:
          deploy:
            runs-on: ubuntu-latest
            steps:
              - uses: actions/checkout@v4
              - name: Setup Taskfile
                run: pip install taskfile
              - name: Deploy to production
                run: taskfile --env prod --platform web run deploy
                env:
                  VPS_IP: ${{ secrets.VPS_IP }}
                  VPS_USER: ${{ secrets.VPS_USER }}
                  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        EOF
      - |
        # Generate GitLab CI configuration
        cat > .gitlab-ci.yml << 'EOF'
        stages:
          - build
          - deploy
        
        variables:
          VPS_IP: $VPS_IP
          VPS_USER: $VPS_USER
        
        build:
          stage: build
          script:
            - pip install taskfile
            - taskfile run build-web
          artifacts:
            paths:
              - dist/
        
        deploy:
          stage: deploy
          script:
            - taskfile --env prod --platform web run deploy
          only:
            - main
        EOF
      - echo "✅ CI/CD files generated:"
      - echo "   .github/workflows/deploy.yml  (GitHub Actions)"
      - echo "   .gitlab-ci.yml                (GitLab CI)"

  # ─── Deployment Validation ────────────────────────────────────
  validate-deploy:
    desc: Validate deployment in isolated Docker environment
    cmds:
      - echo "🧪 Validating deployment in Docker..."
      - |
        # Build test image
        docker build -t ${APP_NAME}-validate:${TAG} -f Dockerfile .
      - |
        # Run container and test health
        docker run -d --name ${APP_NAME}-validate \
          -p 9999:3000 \
          ${APP_NAME}-validate:${TAG}
      - echo "⏳ Waiting for container to start..."
      - sleep 5
      - |
        # Health check
        if curl -sf http://localhost:9999/health; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed"
          docker logs ${APP_NAME}-validate
          docker stop ${APP_NAME}-validate
          docker rm ${APP_NAME}-validate
          exit 1
        fi
      - docker stop ${APP_NAME}-validate
      - docker rm ${APP_NAME}-validate
      - echo "✅ Deployment validation passed"

  validate-vm:
    desc: Validate deployment in VM using Vagrant (requires Vagrant)
    cmds:
      - echo "🖥️  Validating deployment in Vagrant VM..."
      - |
        if ! command -v vagrant &>/dev/null; then
          echo "❌ Vagrant not installed. Install from: https://www.vagrantup.com/"
          exit 1
        fi
      - |
        # Create Vagrantfile if not exists
        if [ ! -f Vagrantfile ]; then
          cat > Vagrantfile << 'EOF'
        Vagrant.configure("2") do |config|
          config.vm.box = "ubuntu/jammy64"
          config.vm.network "forwarded_port", guest: 3000, host: 9999
          config.vm.provision "shell", inline: <<-SHELL
            apt-get update
            apt-get install -y podman
          SHELL
        end
        EOF
        fi
      - vagrant up
      - |
        # Deploy to VM
        export VPS_IP=127.0.0.1
        export VPS_USER=vagrant
        export VPS_SSH_KEY=.vagrant/machines/default/virtualbox/private_key
        taskfile --env prod run deploy-web-prod
      - echo "✅ VM validation complete. Test at: http://localhost:9999"

  # ─── Validation Matrix ────────────────────────────────────
  validate-all:
    desc: Run all validation checks (Docker + health checks)
    cmds:
      - echo "🔍 Running comprehensive validation..."
      - taskfile run validate-deploy
      - taskfile run test
      - echo "✅ All validations passed!"

  # ─── Preflight Checks ────────────────────────────────────
  preflight:
    desc: Check prerequisites before deployment
    cmds:
      - echo "🔍 Checking prerequisites..."
      - docker --version || (echo "❌ Docker required"; exit 1)
      - docker compose version || (echo "❌ Docker Compose required"; exit 1)
      - |
        if command -v ssh &>/dev/null; then
          echo "✅ SSH client available"
        else
          echo "⚠️  SSH client not found (needed for VPS deploy)"
        fi
      - |
        if [ -f .env ]; then
          echo "✅ .env file exists"
        else
          echo "⚠️  .env file missing - run: taskfile run init"
        fi
      - echo "✅ Preflight checks complete"
