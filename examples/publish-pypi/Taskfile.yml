version: "1"
name: my-python-lib
description: >
  Python package → PyPI publishing pipeline.
  Build wheel + sdist, test, upload to PyPI.

variables:
  PACKAGE_NAME: my-python-lib
  VERSION: "0.1.0"
  PYPI_REPO: pypi    # pypi | testpypi

environments:
  local:
    container_runtime: docker
    compose_command: docker compose

tasks:

  install:
    desc: Install development dependencies
    cmds:
      - python -m pip install -e ".[dev]"

  lint:
    desc: Run ruff linter
    cmds:
      - ruff check src/
    ignore_errors: true

  test:
    desc: Run pytest
    deps: [install]
    cmds:
      - pytest tests/ -v --cov=src/

  build:
    desc: Build wheel and sdist
    deps: [test]
    cmds:
      - rm -rf dist/
      - python -m build
      - echo "📦 Built:"
      - ls -la dist/

  check:
    desc: Validate package metadata
    deps: [build]
    cmds:
      - twine check dist/*
      - echo "✅ Package metadata OK"

  publish-testpypi:
    desc: Upload to TestPyPI (safe testing)
    deps: [check]
    cmds:
      - twine upload --repository testpypi dist/*
      - echo "✅ Published to https://test.pypi.org/project/${PACKAGE_NAME}/"

  publish:
    desc: Upload to PyPI (production)
    deps: [check]
    cmds:
      - twine upload dist/*
      - echo "✅ Published to https://pypi.org/project/${PACKAGE_NAME}/${VERSION}/"

  verify:
    desc: Verify package installs from PyPI
    cmds:
      - pip install --force-reinstall ${PACKAGE_NAME}==${VERSION}
      - python -c "import ${PACKAGE_NAME}; print(f'✅ {${PACKAGE_NAME}.__name__} v{${PACKAGE_NAME}.__version__}')"

  release:
    desc: Full release — test, build, tag, publish
    deps: [test, lint]
    parallel: true
    cmds:
      - git tag -a v${VERSION} -m "Release v${VERSION}"
      - git push origin v${VERSION}
      - python -m build
      - twine check dist/*
      - twine upload dist/*
      - echo "🚀 Released ${PACKAGE_NAME} v${VERSION} to PyPI"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ build/ *.egg-info src/*.egg-info
      - echo "🧹 Cleaned"
