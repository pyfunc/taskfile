version: "1"
name: my-python-lib
description: Python package → PyPI publishing pipeline

variables:
  PACKAGE_NAME: my-python-lib
  VERSION: "0.1.0"

tasks:

  lint:
    desc: Run ruff linter
    cmds:
      - ruff check src/
    ignore_errors: true

  test:
    desc: Run pytest with coverage
    cmds:
      - python -m pip install -e ".[dev]"
      - pytest tests/ -v --cov=src/

  build:
    desc: Build wheel + sdist
    deps: [test]
    cmds:
      - rm -rf dist/
      - python -m build
      - twine check dist/*

  publish:
    desc: Upload to PyPI
    deps: [build]
    cmds:
      - twine upload dist/*
      - echo "✅ ${PACKAGE_NAME} v${VERSION} → https://pypi.org/project/${PACKAGE_NAME}/"

  publish-testpypi:
    desc: Upload to TestPyPI (safe testing)
    deps: [build]
    cmds:
      - twine upload --repository testpypi dist/*

  release:
    desc: Tag + build + publish
    deps: [lint, test]
    parallel: true
    cmds:
      - git tag -a v${VERSION} -m "Release v${VERSION}"
      - git push origin v${VERSION}
      - rm -rf dist/ && python -m build && twine check dist/*
      - twine upload dist/*

  verify:
    desc: Check published package installs
    cmds:
      - pip install --force-reinstall ${PACKAGE_NAME}==${VERSION}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ build/ *.egg-info src/*.egg-info
