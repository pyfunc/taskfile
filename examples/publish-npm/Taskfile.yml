version: "1"
name: my-npm-package
description: Node.js package → npm registry publishing pipeline

variables:
  PACKAGE_NAME: "@myorg/my-npm-package"
  VERSION: "0.1.0"

tasks:

  lint:
    desc: Run ESLint
    cmds:
      - npm ci
      - npm run lint
    ignore_errors: true

  test:
    desc: Run tests (vitest/jest)
    cmds:
      - npm ci
      - npm test

  build:
    desc: Build TypeScript → JavaScript
    deps: [test]
    cmds:
      - npm run build
      - npm pack --dry-run

  publish:
    desc: Publish to npm registry
    deps: [build]
    cmds:
      - npm publish --access public

  publish-beta:
    desc: Publish beta version with dist-tag
    deps: [build]
    cmds:
      - npm publish --tag beta --access public

  release:
    desc: Tag + build + publish
    deps: [lint, test]
    parallel: true
    cmds:
      - npm version ${VERSION} --no-git-tag-version
      - npm run build
      - npm publish --access public
      - git tag -a v${VERSION} -m "Release v${VERSION}"
      - git push origin v${VERSION}

  verify:
    desc: Check published package
    cmds:
      - npm info ${PACKAGE_NAME}@${VERSION}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ node_modules/ *.tgz
