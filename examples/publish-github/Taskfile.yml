version: "1"
name: my-cli-tool
description: CLI tool → GitHub Releases (cross-compiled Go binaries)

variables:
  APP_NAME: my-cli-tool
  VERSION: "0.1.0"
  GITHUB_REPO: myorg/my-cli-tool
  DIST_DIR: dist

tasks:

  test:
    desc: Run tests
    cmds:
      - go test ./... -v

  build-linux:
    desc: Build for Linux amd64 + arm64
    deps: [test]
    cmds:
      - mkdir -p ${DIST_DIR}
      - GOOS=linux GOARCH=amd64 go build -o ${DIST_DIR}/${APP_NAME}-linux-amd64 .
      - GOOS=linux GOARCH=arm64 go build -o ${DIST_DIR}/${APP_NAME}-linux-arm64 .

  build-macos:
    desc: Build for macOS (Intel + Apple Silicon)
    deps: [test]
    cmds:
      - mkdir -p ${DIST_DIR}
      - GOOS=darwin GOARCH=amd64 go build -o ${DIST_DIR}/${APP_NAME}-darwin-amd64 .
      - GOOS=darwin GOARCH=arm64 go build -o ${DIST_DIR}/${APP_NAME}-darwin-arm64 .

  build-windows:
    desc: Build for Windows amd64
    deps: [test]
    cmds:
      - mkdir -p ${DIST_DIR}
      - GOOS=windows GOARCH=amd64 go build -o ${DIST_DIR}/${APP_NAME}-windows-amd64.exe .

  build-all:
    desc: Build for all platforms (parallel)
    deps: [build-linux, build-macos, build-windows]
    parallel: true
    cmds:
      - cd ${DIST_DIR} && sha256sum ${APP_NAME}-* > checksums.txt

  release:
    desc: Tag + build + create GitHub Release with assets
    deps: [build-all]
    cmds:
      - git tag -a v${VERSION} -m "Release v${VERSION}"
      - git push origin v${VERSION}
      - >-
        gh release create v${VERSION}
        --repo ${GITHUB_REPO}
        --title "v${VERSION}"
        --generate-notes
        ${DIST_DIR}/${APP_NAME}-linux-amd64
        ${DIST_DIR}/${APP_NAME}-linux-arm64
        ${DIST_DIR}/${APP_NAME}-darwin-amd64
        ${DIST_DIR}/${APP_NAME}-darwin-arm64
        ${DIST_DIR}/${APP_NAME}-windows-amd64.exe
        ${DIST_DIR}/checksums.txt

  verify:
    desc: Check release on GitHub
    cmds:
      - gh release view v${VERSION} --repo ${GITHUB_REPO}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ${DIST_DIR}/
