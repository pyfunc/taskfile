version: "1"
name: unirepo
description: "Monorepo: Python SDK + Rust CLI + Node.js SDK + Docker → 5 registries"

variables:
  PROJECT: unirepo
  VERSION: "0.1.0"
  REGISTRY: ghcr.io/myorg
  DOCKERHUB: myorg/unirepo
  GITHUB_REPO: myorg/unirepo
  DIST: dist

environments:
  prod:
    ssh_host: prod.example.com
    ssh_user: deploy
    ssh_key: ~/.ssh/id_ed25519
    container_runtime: podman

# ─── Python SDK ─────────────────────────────────────

tasks:

  py-lint:
    desc: "py: ruff check"
    cmds:
      - cd packages/python-sdk && ruff check src/
    ignore_errors: true

  py-test:
    desc: "py: pytest"
    cmds:
      - cd packages/python-sdk && pip install -e ".[dev]" && pytest tests/ -v

  py-build:
    desc: "py: wheel + sdist"
    deps: [py-test]
    cmds:
      - cd packages/python-sdk && rm -rf dist/ && python -m build && twine check dist/*

  py-publish:
    desc: "py → PyPI"
    deps: [py-build]
    cmds:
      - cd packages/python-sdk && twine upload dist/*

  # ─── Rust CLI ──────────────────────────────────────

  rs-lint:
    desc: "rs: fmt + clippy"
    cmds:
      - cd packages/rust-cli && cargo fmt --check && cargo clippy -- -D warnings
    ignore_errors: true

  rs-test:
    desc: "rs: cargo test"
    cmds:
      - cd packages/rust-cli && cargo test --verbose

  rs-build:
    desc: "rs: release binary"
    deps: [rs-test]
    cmds:
      - cd packages/rust-cli && cargo build --release
      - mkdir -p ${DIST} && cp packages/rust-cli/target/release/${PROJECT}-cli ${DIST}/

  rs-build-cross:
    desc: "rs: cross-compile Linux + macOS + Windows"
    deps: [rs-test]
    cmds:
      - cd packages/rust-cli && cargo build --release --target x86_64-unknown-linux-gnu
      - cd packages/rust-cli && cargo build --release --target x86_64-apple-darwin
      - cd packages/rust-cli && cargo build --release --target x86_64-pc-windows-gnu
      - mkdir -p ${DIST}
      - cp packages/rust-cli/target/x86_64-unknown-linux-gnu/release/${PROJECT}-cli ${DIST}/${PROJECT}-cli-linux-amd64
      - cp packages/rust-cli/target/x86_64-apple-darwin/release/${PROJECT}-cli ${DIST}/${PROJECT}-cli-darwin-amd64
      - cp packages/rust-cli/target/x86_64-pc-windows-gnu/release/${PROJECT}-cli.exe ${DIST}/${PROJECT}-cli-windows-amd64.exe

  rs-publish:
    desc: "rs → crates.io"
    deps: [rs-test]
    cmds:
      - cd packages/rust-cli && cargo publish

  # ─── Node.js SDK ───────────────────────────────────

  js-lint:
    desc: "js: eslint"
    cmds:
      - cd packages/node-sdk && npm ci && npm run lint
    ignore_errors: true

  js-test:
    desc: "js: npm test"
    cmds:
      - cd packages/node-sdk && npm ci && npm test

  js-build:
    desc: "js: TypeScript → JavaScript"
    deps: [js-test]
    cmds:
      - cd packages/node-sdk && npm run build

  js-publish:
    desc: "js → npm"
    deps: [js-build]
    cmds:
      - cd packages/node-sdk && npm publish --access public

  # ─── Docker ────────────────────────────────────────

  docker-build:
    desc: "docker: build API image"
    cmds:
      - docker build -t ${REGISTRY}/${PROJECT}:${VERSION} -t ${REGISTRY}/${PROJECT}:latest .

  docker-push:
    desc: "docker → GHCR + Docker Hub"
    deps: [docker-build]
    cmds:
      - docker push ${REGISTRY}/${PROJECT}:${VERSION}
      - docker push ${REGISTRY}/${PROJECT}:latest
      - docker tag ${REGISTRY}/${PROJECT}:${VERSION} ${DOCKERHUB}:${VERSION}
      - docker push ${DOCKERHUB}:${VERSION}

  docker-deploy:
    desc: "docker: pull + restart on prod"
    env: [prod]
    cmds:
      - "@remote podman pull ${REGISTRY}/${PROJECT}:${VERSION}"
      - "@remote systemctl --user restart ${PROJECT}"

  # ─── Aggregate tasks ───────────────────────────────

  test-all:
    desc: All tests (parallel)
    deps: [py-test, rs-test, js-test]
    parallel: true
    cmds:
      - echo "All tests passed"

  lint-all:
    desc: All linters (parallel)
    deps: [py-lint, rs-lint, js-lint]
    parallel: true
    continue_on_error: true
    cmds:
      - echo "Lint complete"

  build-all:
    desc: All 4 artifacts (parallel)
    deps: [py-build, rs-build, js-build, docker-build]
    parallel: true
    cmds:
      - echo "All artifacts built"

  publish-all:
    desc: All registries (parallel) — PyPI + crates.io + npm + Docker
    deps: [py-publish, rs-publish, js-publish, docker-push]
    parallel: true
    cmds:
      - echo "All artifacts published"

  release:
    desc: Tag + build + publish + GitHub Release
    deps: [lint-all, test-all]
    parallel: true
    cmds:
      - git tag -a v${VERSION} -m "Release v${VERSION}"
      - git push origin v${VERSION}

  github-release:
    desc: Cross-compile + create GitHub Release with binaries
    deps: [rs-build-cross]
    cmds:
      - cd ${DIST} && sha256sum ${PROJECT}-cli-* > checksums.txt
      - >-
        gh release create v${VERSION} --repo ${GITHUB_REPO}
        --title "v${VERSION}" --generate-notes
        ${DIST}/${PROJECT}-cli-linux-amd64
        ${DIST}/${PROJECT}-cli-darwin-amd64
        ${DIST}/${PROJECT}-cli-windows-amd64.exe
        ${DIST}/checksums.txt

  verify:
    desc: Check all published artifacts exist
    cmds:
      - pip install ${PROJECT}-sdk==${VERSION}
      - cargo search ${PROJECT}-cli
      - npm info @myorg/${PROJECT}-sdk@${VERSION}
      - docker pull ${REGISTRY}/${PROJECT}:${VERSION}
      - gh release view v${VERSION} --repo ${GITHUB_REPO}
    continue_on_error: true

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf ${DIST}/
      - cd packages/python-sdk && rm -rf dist/ build/ *.egg-info
      - cd packages/rust-cli && cargo clean
      - cd packages/node-sdk && rm -rf dist/ node_modules/
