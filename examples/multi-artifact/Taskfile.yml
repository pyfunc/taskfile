version: "1"
name: unirepo
description: >
  Multi-artifact monorepo — one folder produces 4 artifacts:
    1. Python SDK   → PyPI
    2. Rust CLI      → crates.io + GitHub Releases
    3. Node.js SDK   → npm
    4. Docker image  → GHCR + Docker Hub
  Shared version, parallel builds, unified release pipeline.

default_env: local

variables:
  PROJECT_NAME: unirepo
  VERSION: "0.1.0"
  REGISTRY: ghcr.io/myorg
  DOCKERHUB: myorg/unirepo
  GITHUB_REPO: myorg/unirepo
  DIST_DIR: dist

environments:
  local:
    container_runtime: docker
    compose_command: docker compose

  prod:
    ssh_host: prod.example.com
    ssh_user: deploy
    ssh_key: ~/.ssh/id_ed25519
    container_runtime: podman
    variables:
      DOMAIN: api.example.com

# ─── Tasks ────────────────────────────────────────────

tasks:

  # ════════════════════════════════════════════════════
  # Python SDK (packages/python-sdk/)
  # ════════════════════════════════════════════════════

  py-install:
    desc: "Python: install dev dependencies"
    cmds:
      - cd packages/python-sdk && pip install -e ".[dev]"

  py-lint:
    desc: "Python: run ruff"
    cmds:
      - cd packages/python-sdk && ruff check src/
    ignore_errors: true

  py-test:
    desc: "Python: run pytest"
    deps: [py-install]
    cmds:
      - cd packages/python-sdk && pytest tests/ -v --cov=src/

  py-build:
    desc: "Python: build wheel + sdist"
    deps: [py-test]
    cmds:
      - cd packages/python-sdk && rm -rf dist/ && python -m build
      - echo "📦 Python SDK → packages/python-sdk/dist/"

  py-publish:
    desc: "Python: publish to PyPI"
    deps: [py-build]
    cmds:
      - cd packages/python-sdk && twine check dist/* && twine upload dist/*
      - echo "✅ Python SDK v${VERSION} → PyPI"

  # ════════════════════════════════════════════════════
  # Rust CLI (packages/rust-cli/)
  # ════════════════════════════════════════════════════

  rs-fmt:
    desc: "Rust: check formatting"
    cmds:
      - cd packages/rust-cli && cargo fmt --check
    ignore_errors: true

  rs-clippy:
    desc: "Rust: run clippy"
    cmds:
      - cd packages/rust-cli && cargo clippy -- -D warnings
    ignore_errors: true

  rs-test:
    desc: "Rust: run tests"
    cmds:
      - cd packages/rust-cli && cargo test --verbose

  rs-build:
    desc: "Rust: build release binary"
    deps: [rs-test]
    cmds:
      - cd packages/rust-cli && cargo build --release
      - mkdir -p ${DIST_DIR}
      - cp packages/rust-cli/target/release/${PROJECT_NAME}-cli ${DIST_DIR}/
      - echo "📦 Rust CLI → ${DIST_DIR}/${PROJECT_NAME}-cli"

  rs-build-all:
    desc: "Rust: build for Linux + macOS + Windows"
    deps: [rs-test]
    cmds:
      - cd packages/rust-cli && cargo build --release --target x86_64-unknown-linux-gnu
      - cd packages/rust-cli && cargo build --release --target x86_64-apple-darwin
      - cd packages/rust-cli && cargo build --release --target x86_64-pc-windows-gnu
      - mkdir -p ${DIST_DIR}
      - cp packages/rust-cli/target/x86_64-unknown-linux-gnu/release/${PROJECT_NAME}-cli ${DIST_DIR}/${PROJECT_NAME}-cli-linux-amd64
      - cp packages/rust-cli/target/x86_64-apple-darwin/release/${PROJECT_NAME}-cli ${DIST_DIR}/${PROJECT_NAME}-cli-darwin-amd64
      - cp packages/rust-cli/target/x86_64-pc-windows-gnu/release/${PROJECT_NAME}-cli.exe ${DIST_DIR}/${PROJECT_NAME}-cli-windows-amd64.exe
      - echo "📦 Rust CLI binaries → ${DIST_DIR}/"

  rs-publish:
    desc: "Rust: publish to crates.io"
    deps: [rs-test]
    cmds:
      - cd packages/rust-cli && cargo publish
      - echo "✅ Rust CLI v${VERSION} → crates.io"

  # ════════════════════════════════════════════════════
  # Node.js SDK (packages/node-sdk/)
  # ════════════════════════════════════════════════════

  js-install:
    desc: "Node.js: install dependencies"
    cmds:
      - cd packages/node-sdk && npm ci

  js-lint:
    desc: "Node.js: run eslint"
    deps: [js-install]
    cmds:
      - cd packages/node-sdk && npm run lint
    ignore_errors: true

  js-test:
    desc: "Node.js: run tests"
    deps: [js-install]
    cmds:
      - cd packages/node-sdk && npm test

  js-build:
    desc: "Node.js: build TypeScript → JavaScript"
    deps: [js-test]
    cmds:
      - cd packages/node-sdk && npm run build
      - echo "📦 Node.js SDK → packages/node-sdk/dist/"

  js-publish:
    desc: "Node.js: publish to npm"
    deps: [js-build]
    cmds:
      - cd packages/node-sdk && npm publish --access public
      - echo "✅ Node.js SDK v${VERSION} → npm"

  # ════════════════════════════════════════════════════
  # Docker image (root Dockerfile)
  # ════════════════════════════════════════════════════

  docker-build:
    desc: "Docker: build API image"
    cmds:
      - docker build -t ${REGISTRY}/${PROJECT_NAME}:${VERSION} .
      - docker tag ${REGISTRY}/${PROJECT_NAME}:${VERSION} ${REGISTRY}/${PROJECT_NAME}:latest
      - echo "📦 Docker → ${REGISTRY}/${PROJECT_NAME}:${VERSION}"

  docker-push:
    desc: "Docker: push to GHCR + Docker Hub"
    deps: [docker-build]
    cmds:
      - docker push ${REGISTRY}/${PROJECT_NAME}:${VERSION}
      - docker push ${REGISTRY}/${PROJECT_NAME}:latest
      - docker tag ${REGISTRY}/${PROJECT_NAME}:${VERSION} ${DOCKERHUB}:${VERSION}
      - docker push ${DOCKERHUB}:${VERSION}
      - echo "✅ Docker image → GHCR + Docker Hub"

  docker-deploy:
    desc: "Docker: deploy to production"
    env: [prod]
    cmds:
      - "@remote podman pull ${REGISTRY}/${PROJECT_NAME}:${VERSION}"
      - "@remote systemctl --user restart ${PROJECT_NAME}"
      - echo "✅ Deployed ${PROJECT_NAME}:${VERSION} to prod"

  # ════════════════════════════════════════════════════
  # Cross-cutting commands
  # ════════════════════════════════════════════════════

  test-all:
    desc: Run all tests (Python + Rust + Node.js)
    deps: [py-test, rs-test, js-test]
    parallel: true
    cmds:
      - echo "✅ All tests passed"

  lint-all:
    desc: Run all linters
    deps: [py-lint, rs-fmt, rs-clippy, js-lint]
    parallel: true
    continue_on_error: true
    cmds:
      - echo "✅ All linters done"

  build-all:
    desc: Build all artifacts
    deps: [py-build, rs-build, js-build, docker-build]
    parallel: true
    cmds:
      - echo "✅ All 4 artifacts built"

  publish-all:
    desc: Publish everything — PyPI + crates.io + npm + Docker
    deps: [py-publish, rs-publish, js-publish, docker-push]
    parallel: true
    cmds:
      - echo "✅ All 4 artifacts published"

  checksums:
    desc: Generate SHA256 checksums for all artifacts
    deps: [build-all]
    cmds:
      - mkdir -p ${DIST_DIR}
      - cp packages/python-sdk/dist/*.whl ${DIST_DIR}/ 2>/dev/null || true
      - cp packages/python-sdk/dist/*.tar.gz ${DIST_DIR}/ 2>/dev/null || true
      - cd ${DIST_DIR} && sha256sum * > checksums.txt
      - cat ${DIST_DIR}/checksums.txt

  github-release:
    desc: Create GitHub Release with all binaries
    deps: [rs-build-all, checksums]
    cmds:
      - >-
        gh release create v${VERSION}
        --repo ${GITHUB_REPO}
        --title "v${VERSION}"
        --generate-notes
        ${DIST_DIR}/${PROJECT_NAME}-cli-linux-amd64
        ${DIST_DIR}/${PROJECT_NAME}-cli-darwin-amd64
        ${DIST_DIR}/${PROJECT_NAME}-cli-windows-amd64.exe
        ${DIST_DIR}/checksums.txt
      - echo "✅ GitHub Release v${VERSION} created with binaries"

  release:
    desc: "FULL RELEASE — tag + build all + publish all + GitHub Release"
    cmds:
      - echo "🚀 Releasing ${PROJECT_NAME} v${VERSION}..."
      - echo ""
      - echo "Artifacts:"
      - echo "  📦 Python SDK  → PyPI"
      - echo "  📦 Rust CLI    → crates.io + GitHub Releases"
      - echo "  📦 Node.js SDK → npm"
      - echo "  📦 Docker      → GHCR + Docker Hub"
      - echo ""
      - git tag -a v${VERSION} -m "Release v${VERSION}"
      - git push origin v${VERSION}

  verify:
    desc: Verify all published artifacts
    cmds:
      - echo "Verifying published artifacts..."
      - pip install ${PROJECT_NAME}-sdk==${VERSION} && echo "✅ PyPI OK"
      - cargo search ${PROJECT_NAME}-cli && echo "✅ crates.io OK"
      - npm info @myorg/${PROJECT_NAME}-sdk@${VERSION} && echo "✅ npm OK"
      - docker pull ${REGISTRY}/${PROJECT_NAME}:${VERSION} && echo "✅ Docker OK"
      - gh release view v${VERSION} --repo ${GITHUB_REPO} && echo "✅ GitHub Release OK"
    ignore_errors: true

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf ${DIST_DIR}/
      - cd packages/python-sdk && rm -rf dist/ build/ *.egg-info
      - cd packages/rust-cli && cargo clean
      - cd packages/node-sdk && rm -rf dist/ node_modules/
      - echo "🧹 All artifacts cleaned"

  # ─── Local Development ────────────────────────────
  dev:
    desc: Start all services locally
    env: [local]
    cmds:
      - docker compose up -d --build
      - echo "✅ Local dev running"
      - echo "   API:  http://localhost:8080"
      - echo "   Docs: http://localhost:8080/docs"

  dev-stop:
    desc: Stop local dev
    env: [local]
    cmds:
      - docker compose down
