version: "1"
name: iac-pulumi
description: "Pulumi — infrastructure as real code (Python/TypeScript/Go) with stacks"

variables:
  PROJECT: my-infra
  PULUMI_ORG: myorg
  AWS_REGION: eu-west-1

environments:
  dev:
    env_file: .env.dev
    variables:
      PULUMI_STACK: ${PULUMI_ORG}/dev
  staging:
    env_file: .env.staging
    variables:
      PULUMI_STACK: ${PULUMI_ORG}/staging
  prod:
    env_file: .env.prod
    variables:
      PULUMI_STACK: ${PULUMI_ORG}/prod

tasks:
  stack-init:
    desc: Create or select Pulumi stack
    cmds:
      - pulumi stack select ${PULUMI_STACK} || pulumi stack init ${PULUMI_STACK}

  preview:
    desc: Preview infrastructure changes (dry-run)
    deps: [stack-init]
    cmds:
      - pulumi preview --diff

  up:
    desc: Deploy infrastructure
    deps: [stack-init]
    cmds:
      - pulumi up --yes

  destroy:
    desc: Destroy all infrastructure
    deps: [stack-init]
    cmds:
      - pulumi destroy --yes

  stack-output:
    desc: Show stack outputs
    deps: [stack-init]
    silent: true
    cmds:
      - pulumi stack output --json

  refresh:
    desc: Sync Pulumi state with actual cloud resources
    deps: [stack-init]
    cmds:
      - pulumi refresh --yes

  stack-ls:
    desc: List all stacks
    cmds:
      - pulumi stack ls

  logs:
    desc: Show recent deploy logs
    cmds:
      - pulumi logs --follow

  policy-run:
    desc: Run policy pack against current stack
    condition: "test -d .pulumi/policies"
    cmds:
      - pulumi policy run .pulumi/policies

  clean:
    desc: Remove local Pulumi artifacts
    cmds:
      - rm -rf .pulumi/backups/
