version: "1"
name: kiosk-fleet
description: Raspberry Pi fleet — 6 kiosks, rolling/canary deploy, remote repair

default_env: local

variables:
  APP_NAME: kiosk-app
  IMAGE: ghcr.io/myorg/kiosk-app
  TAG: latest

# ─── Environments ─────────────────────────────────────
# Shared defaults avoid repeating ssh_user/ssh_key/runtime on every device.

environment_defaults:
  ssh_user: pi
  ssh_key: ~/.ssh/fleet_ed25519
  container_runtime: podman
  variables:
    KIOSK_DISPLAY: ":0"

environments:
  local:
    container_runtime: docker
    compose_command: docker compose

  kiosk-lobby:
    ssh_host: 192.168.1.10
    variables: { KIOSK_ID: lobby }

  kiosk-cafe:
    ssh_host: 192.168.1.11
    variables: { KIOSK_ID: cafe }

  kiosk-entrance-north:
    ssh_host: 192.168.1.12
    variables: { KIOSK_ID: entrance-north }

  kiosk-entrance-south:
    ssh_host: 192.168.1.13
    variables: { KIOSK_ID: entrance-south }

  kiosk-food-court:
    ssh_host: 192.168.1.14
    variables: { KIOSK_ID: food-court }

  kiosk-parking:
    ssh_host: 192.168.1.15
    variables: { KIOSK_ID: parking }

# ─── Groups ──────────────────────────────────────────

environment_groups:
  all-kiosks:
    members: [kiosk-lobby, kiosk-cafe, kiosk-entrance-north, kiosk-entrance-south, kiosk-food-court, kiosk-parking]
    strategy: rolling
    max_parallel: 2

  entrances:
    members: [kiosk-entrance-north, kiosk-entrance-south]
    strategy: parallel

  high-traffic:
    members: [kiosk-lobby, kiosk-cafe, kiosk-food-court]
    strategy: canary
    canary_count: 1

# ─── Tasks ────────────────────────────────────────────

tasks:

  build:
    desc: Build ARM64 image for RPi fleet
    cmds:
      - docker buildx build --platform linux/arm64 -t ${IMAGE}:${TAG} --push .

  dev:
    desc: Run kiosk locally (x86)
    env: [local]
    cmds:
      - ${COMPOSE} up -d --build

  deploy-kiosk:
    desc: Deploy to single device (or use -G for group)
    tags: [deploy]
    retries: 1
    retry_delay: 5
    cmds:
      - "@remote podman pull ${IMAGE}:${TAG}"
      - "@remote podman stop ${APP_NAME} 2>/dev/null || true"
      - "@remote podman rm ${APP_NAME} 2>/dev/null || true"
      - >-
        @remote podman run -d --name ${APP_NAME} --restart=always
        -p 3000:3000 -e KIOSK_ID=${KIOSK_ID} -e DISPLAY=${KIOSK_DISPLAY}
        ${IMAGE}:${TAG}

  restart-kiosk:
    desc: Restart container on device
    cmds:
      - "@remote podman restart ${APP_NAME}"

  reboot-device:
    desc: Reboot the Raspberry Pi
    cmds:
      - "@remote sudo reboot"

  update-os:
    desc: Update OS packages
    cmds:
      - "@remote sudo apt-get update -qq && sudo apt-get upgrade -y -qq"

  cleanup:
    desc: Free SD card space (prune images, logs)
    cmds:
      - "@remote podman image prune -af"
      - "@remote sudo journalctl --vacuum-size=20M"
      - "@remote sudo apt-get clean"

  logs:
    desc: View kiosk container logs
    cmds:
      - "@remote podman logs -f --tail 100 ${APP_NAME}"

  info:
    desc: Show device hw info (model, RAM, disk, temp)
    cmds:
      - "@remote cat /proc/device-tree/model 2>/dev/null || echo 'Unknown'"
      - "@remote free -h | head -2"
      - "@remote df -h / | tail -1"
      - "@remote vcgencmd measure_temp 2>/dev/null || echo 'N/A'"
      - "@remote uptime"

  provision:
    desc: First-time RPi setup (install Podman, enable linger)
    tags: [setup]
    timeout: 600
    cmds:
      - "@remote sudo apt-get update && sudo apt-get install -y podman"
      - "@remote sudo loginctl enable-linger pi"
      - "@remote mkdir -p ~/.config/containers/systemd"
