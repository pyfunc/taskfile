version: "1"
name: saas-app
description: SaaS app with staging + prod deploy

variables:
  REGISTRY: ghcr.io/myorg
  TAG: latest

# Smart defaults: ssh_host present → podman/quadlet/~/.ssh/id_ed25519
# env_file defaults to .env.{env_name}
hosts:
  staging: { host: staging.myapp.com }
  prod:    { host: prod.myapp.com }

environments:
  local: {}

pipeline:
  branches: [main]
  secrets: [SSH_PRIVATE_KEY, REGISTRY_TOKEN]
  stages:
    - name: test
      tasks: [lint, test]
    - name: build
      tasks: [build, push]
      docker_in_docker: true
    - name: deploy-staging
      tasks: [deploy]
      env: staging
    - name: deploy-prod
      tasks: [deploy]
      env: prod
      when: manual

tasks:
  lint:
    desc: Lint code
    tags: [ci, quality]
    cmds:
      - ruff check .

  test:
    desc: Run tests
    tags: [ci, quality]
    cmds:
      - pytest -v

  build:
    desc: Build images
    deps: [test]
    cmds:
      - ${COMPOSE} build

  push:
    desc: Push to registry
    cmds:
      - ${COMPOSE} push

  deploy:
    desc: Deploy to target environment
    env: [staging, prod]
    tags: [deploy]
    retries: 2
    retry_delay: 10
    timeout: 300
    cmds:
      - "@remote podman pull ${REGISTRY}/saas-app:${TAG}"
      - "@remote systemctl --user restart saas-app"
      - "@remote podman image prune -f"

  dev:
    desc: Start local dev
    env: [local]
    cmds:
      - ${COMPOSE} up -d --build

  logs:
    desc: View logs
    env: [local, staging, prod]
    cmds:
      - "@local ${COMPOSE} logs -f"
      - "@remote journalctl --user -u saas-app -f --no-pager -n 100"

  status:
    desc: Check service status
    env: [local, staging, prod]
    cmds:
      - "@local ${COMPOSE} ps"
      - "@remote podman ps"
      - "@remote free -h"
