    quadlet\n    compose_file: docker-compose.yml\n    env_file: .env.prod\n    quadlet_dir:
    deploy/quadlet\n    quadlet_remote_dir: ~/.config/containers/systemd\n    variables:\n      DOMAIN:
    codereview.pl\n      TLS_ENABLED: "true"\n      ENTRYPOINT: websecure\n      CERT_RESOLVER:
    le\n\n# ─── Tasks ──────────────────────────────────────────\n\ntasks:\n\n  #
    ─── Build ────────────────────────────────────\n  build:\n    desc: Build all
    images\n    cmds:\n      - docker compose --env-file .env.local build\n\n  build-app:\n    desc:
    Build single app (--var APP=web)\n    cmds:\n      - docker build -t ${REGISTRY}/${APP}:${TAG}
    ./apps/${APP}\n\n  push:\n    desc: Push all images to registry\n    deps: [build]\n    cmds:\n      -
    docker compose --env-file .env.local push\n\n  push-app:\n    desc: Push single
    app (--var APP=web)\n    deps: [build-app]\n    cmds:\n      - docker push ${REGISTRY}/${APP}:${TAG}\n\n  test:\n    desc:
    Run tests\n    cmds:\n      - docker compose --env-file .env.local run --rm app
    pytest\n\n  # ─── Local Development ────────────────────────\n  dev:\n    desc:
    Start local dev with Docker Compose + Traefik\n    env: [local]\n    cmds:\n      -
    docker compose --env-file .env.local up -d --build\n      - echo "✅ codereview.pl
    running locally"\n      - echo "   http://app.localhost"\n      - echo "   http://traefik.localhost:8080
    (dashboard)"\n\n  dev-down:\n    desc: Stop local dev\n    env: [local]\n    cmds:\n      -
    docker compose --env-file .env.local down\n\n  dev-logs:\n    desc: Follow local
    logs\n    env: [local]\n    cmds:\n      - docker compose --env-file .env.local
    logs -f\n\n  dev-restart:\n    desc: Restart single service (--var APP=web)\n    env:
    [local]\n    cmds:\n      - docker compose --env-file .env.local restart ${APP}\n\n  #
    ─── Staging Deploy ───────────────────────────\n  deploy-staging:\n    desc: Deploy
    to staging via Docker Compose over SSH\n    env: [staging]\n    deps: [push]\n    cmds:\n      -
    "@remote cd /opt/codereview && docker compose --env-file .env.staging pull"\n      -
    "@remote cd /opt/codereview && docker compose --env-file .env.staging up -d"\n      -
    echo "✅ Deployed to staging.codereview.pl"\n\n  # ─── Production Deploy (Quadlet)
    ──────────────\n  quadlet-generate:\n    desc: Generate Quadlet files from docker-compose.yml
    + .env.prod\n    cmds:\n      - echo "Generating Quadlet files..."\n    # NOTE:
    Use \''taskfile quadlet generate --env-file .env.prod\'' instead\n    # This task
    is a placeholder — the real work is done by the quadlet CLI\n\n  deploy-prod:\n    desc:
    Full production deploy — push, generate quadlet, upload, restart\n    env: [prod]\n    deps:
    [push]\n    cmds:\n      - echo "🚀 Deploying to production..."\n      - "@remote
    podman pull ${REGISTRY}/app:${TAG}"\n      - "@remote podman pull ${REGISTRY}/web:${TAG}"\n      -
    "@remote systemctl --user daemon-reload"\n      - "@remote systemctl --user restart
    app"\n      - "@remote systemctl --user restart web"\n      - "@remote podman
    image prune -f"\n      - echo "✅ Deployed to codereview.pl"\n\n  deploy-quadlet:\n    desc:
    Generate + upload Quadlet files to prod\n    env: [prod]\n    cmds:\n      - echo
    "Generating Quadlet files from docker-compose.yml..."\n    # Run: taskfile quadlet
    generate --env-file .env.prod\n    # Then: taskfile --env prod quadlet upload\n\n  #
    ─── Operations ───────────────────────────────\n  status:\n    desc: Show status
    on target environment\n    env: [staging, prod]\n    cmds:\n      - "@remote ${RUNTIME}
    ps --format \''table {{.Names}}\t{{.Status}}\t{{.Ports}}\''"\n\n  logs:\n    desc:
    View logs on target (--var APP=web)\n    env: [staging, prod]\n    cmds:\n      -
    "@remote journalctl --user -u ${APP} -f --no-pager -n 100"\n\n  ram:\n    desc:
    Check RAM usage on server\n    env: [staging, prod]\n    cmds:\n      - "@remote
    free -h"\n      - "@remote ${RUNTIME} stats --no-stream --format \''table {{.Name}}\t{{.MemUsage}}\''"\n\n  cleanup:\n    desc:
    Clean unused images on server\n    env: [staging, prod]\n    cmds:\n      - "@remote
    ${RUNTIME} image prune -af"\n      - "@remote ${RUNTIME} volume prune -f"\n      -
    echo "🧹 Cleaned"\n\n  # ─── Initial Setup ───────────────────────────\n  setup-server:\n    desc:
    First-time server provisioning\n    env: [prod]\n    cmds:\n      - "@remote sudo
    apt-get update && sudo apt-get install -y podman"\n      - "@remote mkdir -p ~/.config/containers/systemd"\n      -
    "@remote podman network create ${PROXY_NETWORK} 2>/dev/null || true"\n      -
    "@remote loginctl enable-linger $(whoami)"\n      - echo "✅ Server ready for Podman
    Quadlet"\n\n  # ─── Release ──────────────────────────────────\n  release:\n    desc:
    Tag + full deploy pipeline\n    cmds:\n      - git tag -a ${TAG} -m \''Release
    ${TAG}\''\n      - git push origin ${TAG}\n      - echo "📦 Release ${TAG} created"\n'''
