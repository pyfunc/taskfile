    22\n    ssh_key: ~/.ssh/id_ed25519\n    container_runtime: docker\n    compose_command:
    docker compose\n    variables:\n      DOMAIN: staging.example.com\n\n  prod:\n    ssh_host:
    prod.example.com\n    ssh_user: deploy\n    ssh_key: ~/.ssh/id_ed25519\n    container_runtime:
    podman\n    service_manager: quadlet\n    variables:\n      DOMAIN: my-project.example.com\n\n#
    ─── Tasks ────────────────────────────────────────────\n\ntasks:\n\n  # ─── Build
    ────────────────────────────────────\n  build:\n    desc: Build Docker image\n    cmds:\n      -
    docker build -t ${IMAGE}:${TAG} .\n\n  push:\n    desc: Push image to container
    registry\n    deps: [build]\n    cmds:\n      - docker push ${IMAGE}:${TAG}\n\n  test:\n    desc:
    Run tests\n    cmds:\n      - docker compose run --rm app pytest\n    ignore_errors:
    false\n\n  lint:\n    desc: Run linter\n    cmds:\n      - docker compose run
    --rm app ruff check .\n    ignore_errors: true\n\n  # ─── Deploy ───────────────────────────────────\n  deploy-local:\n    desc:
    Start local dev environment\n    env: [local]\n    cmds:\n      - docker compose
    up -d --build\n      - echo "✅ ${APP_NAME} → http://${DOMAIN}"\n\n  deploy-remote:\n    desc:
    Deploy to remote (staging/prod)\n    env: [staging, prod]\n    cmds:\n      -
    "@remote ${RUNTIME} pull ${IMAGE}:${TAG}"\n      - "@remote systemctl --user restart
    ${APP_NAME}"\n      - echo "✅ ${APP_NAME} → https://${DOMAIN}"\n\n  deploy:\n    desc:
    Full deploy pipeline\n    deps: [test, push]\n    cmds:\n      - echo "🚀 Deploying
    ${APP_NAME}:${TAG} to ${ENV}"\n\n  # ─── Release ──────────────────────────────────\n  release:\n    desc:
    Tag, build, push, deploy to prod\n    cmds:\n      - git tag -a ${TAG} -m "Release
    ${TAG}"\n      - git push origin ${TAG}\n      - docker build -t ${IMAGE}:${TAG}
    .\n      - docker push ${IMAGE}:${TAG}\n      - echo "📦 Released ${APP_NAME}:${TAG}"\n\n  #
    ─── Operations ───────────────────────────────\n  logs:\n    desc: View logs (local)\n    env:
    [local]\n    cmds:\n      - docker compose logs -f\n\n  logs-remote:\n    desc:
    View logs (remote)\n    env: [staging, prod]\n    cmds:\n      - "@remote journalctl
    --user -u ${APP_NAME} -f"\n\n  status:\n    desc: Service status (local)\n    env:
    [local]\n    cmds:\n      - docker compose ps\n\n  status-remote:\n    desc: Service
    status (remote)\n    env: [staging, prod]\n    cmds:\n      - "@remote systemctl
    --user status ${APP_NAME}"\n      - "@remote ${RUNTIME} ps --filter name=${APP_NAME}"\n\n  stop:\n    desc:
    Stop all services (local)\n    env: [local]\n    cmds:\n      - docker compose
    down\n\n  stop-remote:\n    desc: Stop service (remote)\n    env: [staging, prod]\n    cmds:\n      -
    "@remote systemctl --user stop ${APP_NAME}"\n\n  restart-remote:\n    desc: Restart
    service (remote)\n    env: [staging, prod]\n    cmds:\n      - "@remote systemctl
    --user restart ${APP_NAME}"\n\n  # ─── Maintenance ──────────────────────────────\n  cleanup:\n    desc:
    Remove unused Docker resources\n    cmds:\n      - docker image prune -af\n      -
    docker volume prune -f\n      - docker builder prune -f\n      - echo "🧹 Cleaned
    up local Docker resources"\n\n  cleanup-remote:\n    desc: Clean unused images
    on server\n    env: [staging, prod]\n    cmds:\n      - "@remote ${RUNTIME} image
    prune -af"\n      - "@remote ${RUNTIME} volume prune -f"\n\n  # ─── Setup ────────────────────────────────────\n  setup-server:\n    desc:
    Initial server setup (install Podman, create dirs)\n    env: [prod]\n    cmds:\n      -
    "@remote sudo apt-get update && sudo apt-get install -y podman"\n      - "@remote
    mkdir -p ~/.config/containers/systemd"\n      - "@remote podman network create
    proxy 2>/dev/null || true"\n      - "@remote loginctl enable-linger $(whoami)"\n      -
    echo "✅ Server ready for Podman Quadlet"\n\n  upload-quadlet:\n    desc: Upload
    Quadlet files to server\n    env: [prod]\n    cmds:\n      - scp deploy/*.container
    deploy/*.network ${SSH_USER}@${SSH_HOST}:~/.config/containers/systemd/\n      -
    "@remote systemctl --user daemon-reload"\n      - echo "✅ Quadlet files uploaded"\n'''
