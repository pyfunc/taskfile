    web application (Docker container)\n    variables:\n      BUILD_DIR: dist/web\n      WEB_PORT:
    "3000"\n\n  desktop:\n    desc: Desktop application (Electron/Tauri)\n    variables:\n      BUILD_DIR:
    dist/desktop\n\n  mobile:\n    desc: Mobile application (Flutter/React Native)\n    variables:\n      BUILD_DIR:
    dist/mobile\n\n  landing:\n    desc: Static landing page with downloads\n    variables:\n      BUILD_DIR:
    dist/landing\n\ntasks:\n\n  # ─── Preflight ──────────────────────────────────\n  preflight:\n    desc:
    Check all publishing prerequisites\n    cmds:\n      - echo "Checking publish
    prerequisites..."\n      - python3 -m build --version || echo "python-build missing"\n      -
    twine --version || echo "twine missing (pip install twine)"\n      - npm --version
    || echo "npm missing"\n      - docker --version || echo "docker missing"\n      -
    gh --version || echo "gh CLI missing"\n      - echo "Preflight done"\n\n  # ───
    Version bump ───────────────────────────────\n  version-bump:\n    desc: Bump
    version across all package manifests\n    cmds:\n      - echo "Bumping to ${TAG}..."\n      -
    sed -i "s/^version = .*/version = \\"${TAG}\\"/" pyproject.toml\n      - npm version
    ${TAG} --no-git-tag-version 2>/dev/null || true\n      - echo "Version ${TAG}
    set in all manifests"\n\n  # ─── Python → PyPI ──────────────────────────────\n  build-pypi:\n    desc:
    Build Python package\n    platform: [lib]\n    condition: test -f pyproject.toml\n    cmds:\n      -
    python3 -m build --outdir dist/pypi/\n      - echo "Python package built"\n\n  publish-pypi:\n    desc:
    Publish to PyPI\n    platform: [lib]\n    env: [prod]\n    deps: [build-pypi]\n    condition:
    test -f pyproject.toml\n    cmds:\n      - twine upload dist/pypi/* --non-interactive\n      -
    echo "Published to PyPI"\n\n  publish-pypi-test:\n    desc: Publish to TestPyPI
    (dry run)\n    platform: [lib]\n    env: [staging]\n    deps: [build-pypi]\n    condition:
    test -f pyproject.toml\n    cmds:\n      - twine upload --repository testpypi
    dist/pypi/* --non-interactive\n      - echo "Published to TestPyPI"\n\n  # ───
    Node.js → npm ─────────────────────────────\n  build-npm:\n    desc: Build npm
    package\n    platform: [lib]\n    condition: test -f package.json\n    cmds:\n      -
    npm run build:lib 2>/dev/null || echo "No npm build step"\n      - echo "npm package
    ready"\n\n  publish-npm:\n    desc: Publish to npm registry\n    platform: [lib]\n    env:
    [prod]\n    deps: [build-npm]\n    condition: test -f package.json\n    cmds:\n      -
    npm publish --access public\n      - echo "Published to npm"\n\n  # ─── All registries
    at once ─────────────────────\n  publish-all-registries:\n    desc: Publish to
    ALL package registries (parallel)\n    platform: [lib]\n    env: [prod]\n    parallel:
    true\n    ignore_errors: true\n    deps: [publish-pypi, publish-npm]\n    cmds:\n      -
    echo "Published to all configured registries"\n\n  # ─── Container images ──────────────────────────\n  build-container:\n    desc:
    Build multi-arch container image\n    platform: [web]\n    cmds:\n      - |\n        docker
    buildx build \\\n          --platform linux/amd64,linux/arm64 \\\n          -t
    ${REGISTRY_GHCR}/${APP_NAME}:${TAG} \\\n          -t ${REGISTRY_GHCR}/${APP_NAME}:latest
    \\\n          --push .\n      - echo "Container pushed to GHCR"\n\n  # ─── Desktop
    builds ────────────────────────────\n  build-desktop:\n    desc: Build desktop
    app for current OS\n    platform: [desktop]\n    cmds:\n      - echo "Building
    desktop ${APP_NAME}:${TAG}..."\n      - |\n        if [ -f src-tauri/tauri.conf.json
    ]; then\n          cargo tauri build\n        elif [ -f electron-builder.yml ];
    then\n          npx electron-builder --linux\n        fi\n      - echo "Desktop
    builds done"\n\n  publish-github-releases:\n    desc: Upload desktop binaries
    to GitHub Releases\n    platform: [desktop]\n    env: [prod]\n    deps: [build-desktop]\n    cmds:\n      -
    |\n        gh release view ${TAG} 2>/dev/null || \\\n          gh release create
    ${TAG} \\\n            --title "Release ${TAG}" \\\n            --generate-notes\n      -
    |\n        gh release upload ${TAG} \\\n          ${BUILD_DIR}/* \\\n          --clobber
    2>/dev/null || true\n      - echo "GitHub Releases updated"\n\n  # ─── Landing
    page ──────────────────────────────\n  build-landing:\n    desc: Generate landing
    page with download links\n    platform: [landing]\n    cmds:\n      - mkdir -p
    dist/landing\n      - echo "Landing page generated"\n\n  deploy-landing:\n    desc:
    Deploy landing page to VPS\n    platform: [landing]\n    env: [prod]\n    deps:
    [build-landing]\n    cmds:\n      - scp -r dist/landing/* ${SSH_USER}@${SSH_HOST}:/var/www/${APP_NAME}/\n      -
    "@remote nginx -t && systemctl reload nginx"\n      - echo "Landing deployed"\n\n  #
    ─── Web deploy ────────────────────────────────\n  deploy-web:\n    desc: Deploy
    SaaS to production VPS\n    platform: [web]\n    env: [prod]\n    deps: [build-container]\n    cmds:\n      -
    "@remote podman pull ${REGISTRY_GHCR}/${APP_NAME}:${TAG}"\n      - "@remote systemctl
    --user restart ${APP_NAME}"\n      - echo "SaaS deployed"\n\n  # ─── Master release
    ────────────────────────────\n  release:\n    desc: "Full release: bump version
    → build → publish everywhere"\n    cmds:\n      - echo "Releasing ${APP_NAME}:${TAG}"\n      -
    taskfile run version-bump\n      - git add -A\n      - git commit -m "Release
    ${TAG}" --allow-empty\n      - git tag -a ${TAG} -m "Release ${TAG}"\n      -
    git push origin main --tags\n      - taskfile --env prod --platform lib run publish-all-registries\n      -
    taskfile --env prod --platform web run build-container\n      - taskfile --env
    prod --platform desktop run publish-github-releases\n      - taskfile --env prod
    --platform web run deploy-web\n      - taskfile --env prod --platform landing
    run deploy-landing\n      - taskfile --env prod run health-check\n      - echo
    "Release ${TAG} complete"\n\n  # ─── Health check ───────────────────────────────\n  health-check:\n    desc:
    Verify all published artifacts\n    env: [prod]\n    cmds:\n      - echo "Checking
    published artifacts..."\n      - curl -sf https://${DOMAIN}/ > /dev/null && echo
    "Landing OK" || echo "Landing FAIL"\n      - curl -sf https://app.${DOMAIN}/health
    > /dev/null && echo "Web app OK" || echo "Web app FAIL"\n      - echo "Health
    check done"\n\n  # ─── Selective publish ──────────────────────────\n  publish-registries-only:\n    desc:
    Publish only package registries (no desktop/mobile)\n    cmds:\n      - taskfile
    --env prod --platform lib run publish-all-registries\n      - taskfile --env prod
    --platform web run build-container\n\n  publish-desktop-only:\n    desc: Build
    and publish only desktop apps\n    cmds:\n      - taskfile --env prod --platform
    desktop run publish-github-releases\n\npipeline:\n  stages:\n    - name: test\n      tasks:
    [preflight]\n    - name: publish\n      tasks: [publish-all-registries]\n      env:
    prod\n      when: tag\n    - name: deploy\n      tasks: [deploy-web, deploy-landing]\n      env:
    prod\n      when: tag\n      docker_in_docker: true\n'''
