  context: '''version: "1"\nname: my-multiplatform-app\ndescription: >\n  Multi-platform
    deployment example.\n  Desktop (Electron) + Web (Docker/CDN) × Local + Production.\n  Standardized
    deploy format: taskfile --env <env> --platform <platform> run deploy\n\ndefault_env:
    local\ndefault_platform: web\n\nvariables:\n  APP_NAME: my-app\n  REGISTRY: ghcr.io/myorg\n  TAG:
    latest\n  DOMAIN: my-app.example.com\n\n# ─── Environments ─────────────────────────────────────\n#\n#
    Environment = WHERE we deploy (local machine vs remote server)\n#\n\nenvironments:\n  local:\n    container_runtime:
    docker\n    compose_command: docker compose\n    env_file: .env.local\n    variables:\n      DOMAIN:
    ${APP_NAME}.localhost\n\n  prod:\n    ssh_host: prod.example.com\n    ssh_user:
    deploy\n    ssh_key: ~/.ssh/id_ed25519\n    container_runtime: podman\n    service_manager:
    quadlet\n    env_file: .env.prod\n    variables:\n      DOMAIN: my-app.example.com\n\n#
    ─── Platforms ────────────────────────────────────────\n#\n# Platform = WHAT we
    deploy (desktop app vs web app)\n# Each platform has its own build/deploy commands
    and variables.\n#\n\nplatforms:\n  desktop:\n    desc: Electron desktop application\n    variables:\n      BUILD_DIR:
    dist/desktop\n      ELECTRON_BUILDER_OPTS: "--linux --win --mac"\n    build_cmd:
    npm run build:electron\n    deploy_cmd: npm run publish:electron\n\n  web:\n    desc:
    Web application (Docker container)\n    variables:\n      BUILD_DIR: dist/web\n      WEB_PORT:
    "3000"\n    build_cmd: npm run build:web\n    deploy_cmd: docker compose up -d\n\n#
    ─── Tasks ────────────────────────────────────────────\n\ntasks:\n\n  # ─── Common
    ─────────────────────────────────────\n  install:\n    desc: Install dependencies\n    cmds:\n      -
    npm ci\n\n  lint:\n    desc: Run linter\n    cmds:\n      - npm run lint\n    ignore_errors:
    true\n\n  test:\n    desc: Run tests\n    cmds:\n      - npm run test\n\n  # ───
    Build ──────────────────────────────────────\n  build:\n    desc: Build for current
    platform\n    deps: [install, test]\n    cmds:\n      - echo "🔨 Building ${APP_NAME}
    for platform=${PLATFORM} env=${ENV}"\n      - npm run build:${PLATFORM}\n\n  build-desktop:\n    desc:
    Build Electron desktop app\n    platform: [desktop]\n    deps: [install]\n    cmds:\n      -
    npm run build:electron\n      - echo "📦 Desktop build → ${BUILD_DIR}"\n\n  build-web:\n    desc:
    Build web app\n    platform: [web]\n    deps: [install]\n    cmds:\n      - npm
    run build:web\n      - echo "📦 Web build → ${BUILD_DIR}"\n\n  # ─── Deploy: Desktop
    × Local ───────────────────\n  deploy-desktop-local:\n    desc: Run desktop app
    locally (dev mode)\n    env: [local]\n    platform: [desktop]\n    cmds:\n      -
    npm run dev:electron\n      - echo "✅ Desktop app running locally"\n\n  # ───
    Deploy: Desktop × Prod ────────────────────\n  deploy-desktop-prod:\n    desc:
    Publish desktop app to release channels\n    env: [prod]\n    platform: [desktop]\n    deps:
    [build-desktop]\n    cmds:\n      - npm run publish:electron -- ${ELECTRON_BUILDER_OPTS}\n      -
    echo "✅ Desktop ${APP_NAME}:${TAG} published"\n\n  # ─── Deploy: Web × Local ───────────────────────\n  deploy-web-local:\n    desc:
    Start web app locally with Docker Compose\n    env: [local]\n    platform: [web]\n    cmds:\n      -
    docker compose --env-file .env.local up -d --build\n      - echo ""\n      - "echo
    \''✅ Web app running:\''"\n      - "echo \''   http://${DOMAIN}\''"\n\n  # ───
    Deploy: Web × Prod ────────────────────────\n  deploy-web-prod:\n    desc: Deploy
    web app to production server\n    env: [prod]\n    platform: [web]\n    deps:
    [build-web]\n    cmds:\n      - docker build -t ${REGISTRY}/${APP_NAME}:${TAG}
    .\n      - docker push ${REGISTRY}/${APP_NAME}:${TAG}\n      - "@remote podman
    pull ${REGISTRY}/${APP_NAME}:${TAG}"\n      - "@remote systemctl --user restart
    ${APP_NAME}"\n      - "@remote podman image prune -f"\n      - echo "✅ Web ${APP_NAME}:${TAG}
    → https://${DOMAIN}"\n\n  # ─── Universal deploy (auto-routes) ────────────\n  deploy:\n    desc:
    "Deploy to current env+platform (use --env and --platform)"\n    cmds:\n      -
    echo "🚀 Deploying ${APP_NAME} — env=${ENV} platform=${PLATFORM} tag=${TAG}"\n      -
    taskfile --env ${ENV} --platform ${PLATFORM} run deploy-${PLATFORM}-${ENV}\n\n  #
    ─── Operations ─────────────────────────────────\n  status:\n    desc: Check service
    status\n    env: [prod]\n    platform: [web]\n    cmds:\n      - "@remote podman
    ps --filter name=${APP_NAME}"\n\n  logs:\n    desc: View logs\n    env: [local]\n    platform:
    [web]\n    cmds:\n      - docker compose logs -f\n\n  logs-remote:\n    desc:
    View remote logs\n    env: [prod]\n    platform: [web]\n    cmds:\n      - "@remote
    journalctl --user -u ${APP_NAME} -f --no-pager -n 100"\n\n  stop:\n    desc: Stop
    local services\n    env: [local]\n    platform: [web]\n    cmds:\n      - docker
    compose down\n\n  stop-remote:\n    desc: Stop remote service\n    env: [prod]\n    platform:
    [web]\n    cmds:\n      - "@remote systemctl --user stop ${APP_NAME}"\n\n  # ───
    Cleanup ────────────────────────────────────\n  cleanup:\n    desc: Remove build
    artifacts\n    cmds:\n      - rm -rf dist/\n      - echo "🧹 Cleaned build artifacts"\n\n  cleanup-remote:\n    desc:
    Clean unused images on server\n    env: [prod]\n    platform: [web]\n    cmds:\n      -
    "@remote podman image prune -af"\n      - "@remote podman volume prune -f"\n      -
    echo "🧹 Cleaned remote resources"\n\n  # ─── Release ────────────────────────────────────\n  release:\n    desc:
    Full release — tag, build all platforms, deploy\n    cmds:\n      - echo "🚀 Releasing
    ${APP_NAME}:${TAG}"\n      - git tag -a ${TAG} -m "Release ${TAG}"\n      - git
    push origin ${TAG}\n      - taskfile --env prod --platform web run deploy-web-prod\n      -
    taskfile --env prod --platform desktop run deploy-desktop-prod\n      - echo "📦
    Released ${APP_NAME}:${TAG} on all platforms"\n'''
