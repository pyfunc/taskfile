version: "1"
name: my-app
description: Minimal Taskfile

variables:
  APP_NAME: my-app

environments:
  local:
    container_runtime: docker
    compose_command: docker compose

tasks:
  build:
    desc: Build the application
    cmds:
      - echo "Configure 'build' for ${APP_NAME}"

  test:
    desc: Run tests
    cmds:
      - echo "Configure 'test' for ${APP_NAME}"

  run:
    desc: Run the application locally
    cmds:
      - echo "Configure 'run' for ${APP_NAME}"

  clean:
    desc: Remove build artefacts
    cmds:
      - echo "Configure 'clean' for ${APP_NAME}"
